<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Access | MATDAANSECURE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* --- SAME CSS, UNCHANGED --- */
:root {
  --primary:#1E3A8A; --accent:#0EA5E9;
  --success:#10B981; --error:#EF4444;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif;}
body{
  background:linear-gradient(135deg,#f3f4f6,#e5e7eb);
  min-height:100vh;padding-top:100px;
  display:flex;flex-direction:column;align-items:center;
}
.app-header{
  position:fixed;top:0;left:0;width:100%;height:64px;
  background:rgba(255,255,255,.9);backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;box-shadow:0 2px 15px rgba(0,0,0,.05);z-index:3000;
}
.header-left{display:flex;align-items:center;gap:12px}
.header-left img{width:38px}
.header-left span{font-size:22px;font-weight:700;color:var(--primary)}
.header-right button{
  background:var(--primary);color:#fff;border:none;
  padding:10px 18px;border-radius:8px;cursor:pointer;font-weight:600
}
.container{
  width:100%;max-width:450px;background:#fff;padding:40px;
  border-radius:24px;box-shadow:0 20px 25px rgba(0,0,0,.1);
  position:relative;overflow:hidden;
}
.input-group{margin-bottom:20px}
input{
  width:100%;padding:14px 16px;border:2px solid #e2e8f0;
  border-radius:12px;font-size:16px;background:#f8fafc
}
.strength-meter{height:4px;background:#e2e8f0;margin-top:-15px;margin-bottom:20px}
.strength-bar{height:100%;width:0%;transition:.4s}
.update-btn{
  width:100%;padding:16px;border:none;border-radius:12px;
  background:var(--primary);color:#fff;font-weight:700;cursor:pointer
}
.success-overlay{
  position:absolute;inset:0;background:#fff;display:none;
  flex-direction:column;align-items:center;justify-content:center;z-index:10
}
</style>
</head>

<body>

<div class="app-header">
  <div class="header-left">
    <img src="{{ url_for('static', filename='images/logo.png') }}">
    <span>MATDAANSECURE</span>
  </div>
  <div class="header-right">
    <button onclick="window.location.href='/home'">← Back to Home</button>
  </div>
</div>

<div class="container">
  <div class="success-overlay" id="successLayer">
    <h3 style="color:#10B981">Security Updated</h3>
    <p>Password changed successfully</p>
  </div>

  <h2>🔑 Security</h2>
  <p style="margin-bottom:30px;color:#64748b">Update your password</p>

  <div class="input-group">
    <input type="password" id="oldPass" placeholder="Current Password">
  </div>

  <div class="input-group">
    <input type="password" id="newPass" placeholder="New Password" oninput="checkStrength(this.value)">
  </div>

  <div class="strength-meter">
    <div id="strengthBar" class="strength-bar"></div>
  </div>

  <div class="input-group">
    <input type="password" id="confirmPass" placeholder="Confirm New Password">
  </div>

  <button class="update-btn" onclick="changePassword()">
    <span id="btnText">Update Password</span>
  </button>
</div>

<script>
function checkStrength(pass){
  const bar=document.getElementById("strengthBar");
  let s=0;
  if(pass.length>6)s++;
  if(/[A-Z]/.test(pass))s++;
  if(/[0-9]/.test(pass))s++;
  if(/[^A-Za-z0-9]/.test(pass))s++;
  bar.style.width=["0%","25%","50%","75%","100%"][s];
  bar.style.background=["","#EF4444","#F59E0B","#10B981","#059669"][s];
}

async function changePassword(){
  const oldPass=oldPassEl.value.trim();
  const newPass=newPassEl.value.trim();
  const confirmPass=confirmPassEl.value.trim();
  const btnText=document.getElementById("btnText");

  if(!oldPass||!newPass||!confirmPass) return alert("All fields required");
  if(newPass!==confirmPass) return alert("Passwords do not match");

  btnText.innerText="Processing...";

  try{
    const res=await fetch("/change-password-secure",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      credentials:"include",
      body:JSON.stringify({old_password:oldPass,new_password:newPass})
    });
	
    const data=await res.json();

    if(data.success){
      document.getElementById("successLayer").style.display="flex";
      setTimeout(()=>location.href="/home",2000);
    }else{
      btnText.innerText="Update Password";
      alert(data.message);
    }
  }catch(e){
    btnText.innerText="Update Password";
    alert("Server error");
  }
}

const oldPassEl=document.getElementById("oldPass");
const newPassEl=document.getElementById("newPass");
const confirmPassEl=document.getElementById("confirmPass");
</script>
</body>
</html>
