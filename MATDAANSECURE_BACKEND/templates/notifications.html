<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | MATDAANSECURE</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1E3A8A;
            --accent: #0EA5E9;
            --primary-light: #EFF6FF;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --bg: #f8fafc;
            --white: #ffffff;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --card-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: white;
            background-image: none;
            color: var(--text-main);
            min-height: 100vh;
            padding-top: 100px;
        }
/* ===== ASHOKA CHAKRA BACKGROUND ===== */
.chakra-bg {
    position: fixed;
    top: 50%; 
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px; 
    height: 600px;
    opacity: 0.03;
    z-index: -1;
    animation: spin 40s linear infinite;
    pointer-events: none;
}

@keyframes spin { 
    from { transform: translate(-50%, -50%) rotate(0deg); } 
    to { transform: translate(-50%, -50%) rotate(360deg); } 
}
         /* ===== COMMON APP BAR ===== */
  .app-header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 64px;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;   /* ⬅ reduce from 24px */
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  z-index: 3000;
  box-sizing: border-box; /* ⬅ VERY IMPORTANT */
}


    .header-left{
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-left img{
      width: 38px;
      height: 38px;
    }

    .header-left span{
      font-size: 22px;
      font-weight: 700;
      color: #1E3A8A;
    }
 .header-right button{
      background: #1E3A8A;
      color: #ffffff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    .header-right button:hover{
      background: #2563EB;
    }


        /* ===== CONTAINER ===== */
        .container {
            max-width: 720px;
            margin: auto;
            padding: 0 20px 60px;
        }

        .page-title {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 32px;
            animation: fadeIn 0.8s ease-out;
        }

        .page-title h2 {
            color: var(--primary);
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.025em;
        }

        .page-title h2 i {
            margin-right: 10px;
            color: var(--accent);
        }

        .mark-read-btn {
            background: var(--white);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .mark-read-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--primary-light);
        }

        /* ===== NOTIFICATION CARD ===== */
        .notification {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px;
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--card-shadow);
            opacity: 0; /* Handled by JS animation */
            transform: translateY(20px);
        }

        .notification:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: var(--card-hover);
            border-color: var(--accent);
        }

        /* UNREAD STATE */
        .notification.unread {
            border-left: 6px solid var(--accent);
            background: linear-gradient(to right, #f0f9ff, #ffffff);
        }

        .notification.unread::after {
            content: "";
            position: absolute;
            top: 24px;
            right: 24px;
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15);
            animation: pulse 2s infinite;
        }

        /* READ STATE */
        .notification.read {
            border-left: 6px solid transparent;
            opacity: 0.9;
        }

        .icon-box {
            width: 52px;
            height: 52px;
            background: var(--primary-light);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1.3rem;
            flex-shrink: 0;
            transition: transform 0.3s;
        }

        .notification:hover .icon-box {
            transform: rotate(10deg);
        }

        .content-box h4 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 6px;
        }

        .content-box p {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .meta {
            margin-top: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(14, 165, 233, 0); }
            100% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0); }
        }

        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.2;
        }
    </style>
</head>
<body>

<!-- APP HEADER -->
<div class="app-header">
  <div class="header-left">
    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="MATDAANSECURE">
<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <span>MATDAANSECURE</span>
  </div>
  <div class="header-right">
    <button onclick="window.location.href='home'">← Back to Home</button>
  </div>
</div>
<img src="https://upload.wikimedia.org/wikipedia/commons/1/17/Ashoka_Chakra.svg" alt="Ashoka Chakra" class="chakra-bg">
<main class="container">
    <div class="page-title">
        <h2><i class="fa-solid fa-bell"></i> Notifications</h2>
        <button class="mark-read-btn" onclick="markAllRead()">
            <i class="fa-solid fa-check-double"></i> Mark all as read
        </button>
    </div>

    <div id="list">
        <div class="empty-state" id="loader">
            <i class="fa-solid fa-circle-notch fa-spin"></i>
            <p>Fetching your updates...</p>
        </div>
    </div>
</main>

<script type="module">
    async function loadNotifications() {
        const res = await fetch("/get-notifications");
        const data = await res.json();
        const list = document.getElementById("list");
        list.innerHTML = "";

        if (data.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <i class="fa-solid fa-bell-slash"></i>
                    <p>No notifications yet</p>
                </div>`;
            return;
        }

        data.forEach((n, index) => {
            const card = document.createElement("div");

            const isUnread = (n.is_read === false || n.is_read === 0);
            card.className = `notification ${isUnread ? "unread" : "read"}`;
            
            // Staggered animation delay
            card.style.animation = `cardIn 0.5s ease forwards ${index * 0.1}s`;

            let icon = "fa-bell";
            if (n.title.toLowerCase().includes("voting")) icon = "fa-check-to-slot";
            if (n.title.toLowerCase().includes("maintenance")) icon = "fa-screwdriver-wrench";
            if (n.title.toLowerCase().includes("result")) icon = "fa-trophy";

            card.innerHTML = `
                <div class="icon-box">
                    <i class="fa-solid ${icon}"></i>
                </div>
                <div class="content-box">
                    <h4>${n.title}</h4>
                    <p>${n.body}</p>
                    <div class="meta">
                        <i class="fa-regular fa-clock"></i>
                        ${new Date(n.created_at).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' })}
                    </div>
                </div>
            `;

            list.appendChild(card);
        });
    }

    window.markAllRead = function () {
        fetch("/mark-all-read", { method: "POST" })
            .then(() => {
                document.querySelectorAll(".notification.unread").forEach(el => {
                    el.style.transition = "all 0.5s ease";
                    el.classList.remove("unread");
                    el.classList.add("read");
                });
            });
    };

    loadNotifications();
</script>

</body>
</html>
