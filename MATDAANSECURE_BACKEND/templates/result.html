<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>View Results | MATDAANSECURE</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', 'Segoe UI', sans-serif;
    }

    body {
      background: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #1e293b;
      overflow-x: hidden;
      position: relative;
      padding-top: 100px;
    }

    /* ===== ASHOKA CHAKRA BACKGROUND ===== */
  .chakra-bg {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 600px; height: 600px;
    opacity: 0.03;
    z-index: -1;
    animation: spin 40s linear infinite;
    pointer-events: none;
  }

  @keyframes spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }


    h1 {
      color: #1E3A8A;
      text-align: center;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      margin-bottom: 10px;
      animation: fadeInDown 0.8s ease;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== RESULTS CARD ===== */
    .results-card {
      width: 90%;
      max-width: 900px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(30, 58, 138, 0.08);
      border: 1px solid #f1f5f9;
      padding: 24px;
      z-index: 10;
      margin-bottom: 40px;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 12px;
    }

    th {
      color: #64748b;
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 12px;
      text-align: left;
    }

    td {
      background: #ffffff;
      padding: 16px;
      transition: all 0.3s ease;
      border-top: 1px solid #f1f5f9;
      border-bottom: 1px solid #f1f5f9;
    }

    td:first-child { border-left: 1px solid #f1f5f9; border-radius: 12px 0 0 12px; }
    td:last-child { border-right: 1px solid #f1f5f9; border-radius: 0 12px 12px 0; text-align: right; font-weight: 700;}

    tr { animation: slideIn 0.5s ease forwards; opacity: 0; }
    @keyframes slideIn {
      to { opacity: 1; transform: translateX(0); }
      from { opacity: 0; transform: translateX(-20px); }
    }

    /* ===== WINNER ROW STYLING ===== */
    .winner td {
      background: #f0f9ff;
      border-color: #bae6fd;
      color: #1E3A8A;
    }
    .winner-badge {
      background: #1e3a8a;
      color: #ffffff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      margin-left: 10px;
      box-shadow: 0 4px 10px rgba(30, 58, 138, 0.2);
    }

    /* ===== CHART CONTAINER ===== */
    #chart-container {
  width: 90%;
  max-width: 900px;
  background: #ffffff; /* Pure white is already the lightest possible */
  border-radius: 24px; /* Slightly rounder for a softer feel */
  padding: 40px;       /* Increased padding creates more 'breathable' space */
  
  /* A much softer, larger spread shadow feels 'lighter' than a tight dark one */
  box-shadow: 0 20px 50px rgba(0,0,0,0.02); 
  
  /* Removing or lightening the border reduces the 'boxed-in' feeling */
  border: none; 
  
  margin-bottom: 60px;
  z-index: 10;
}

    /* ===== APP HEADER (Untouched) ===== */
    .app-header {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 64px;
      background: white; display: flex; align-items: center;
      justify-content: space-between; padding: 0 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06); z-index: 3000;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-left img { width: 38px; height: 38px; }
    .header-left span { font-size: 22px; font-weight: 700; color: #1E3A8A; }
    .header-right button {
      background: #1E3A8A; color: white; border: none;
      padding: 8px 16px; border-radius: 8px; cursor: pointer;
      font-weight: 600; transition: 0.2s;
    }
    .header-right button:hover { background: #2563EB; }

  </style>
</head>
<body>

 <img src="https://upload.wikimedia.org/wikipedia/commons/1/17/Ashoka_Chakra.svg" alt="Ashoka Chakra" class="chakra-bg">


  <div class="app-header">
    <div class="header-left">
      <img src="{{ url_for('static', filename='images/logo.png') }}">
      <span>MATDAANSECURE</span>
    </div>
    <div class="header-right">
      <button onclick="window.location.href='home'">← Back to Home</button>
    </div>
  </div>

  <h1>🗳️ Election Live Results</h1>
  <p style="color: #64748b; margin-bottom: 20px; z-index: 10;">Real-time updates from secure blockchain nodes</p>

  <div class="results-card">
    <table id="resultTable">
      <thead>
        <tr>
          <th>Candidate & Party</th>
          <th>Platform</th>
          <th style="text-align: right;">Total Votes</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div id="chart-container">
    <canvas id="resultChart"></canvas>
  </div>

  <script>
    // Logic remains exactly as provided
    let chartInstance = null;
    
    async function loadResults() {
      const res = await fetch("/api/results");
      const data = await res.json();
      const tbody = document.querySelector("#resultTable tbody");
      tbody.innerHTML = "";
      const maxVotes = Math.max(...data.map(d => d.total_votes), 0);
      const labels = [];
      const votes = [];
      const colors = [];

      data.forEach((row, index) => {
     const meta = {
  name: row.name,
  party: row.party
};
        const isWinner = row.total_votes === maxVotes && maxVotes > 0;
        const tr = document.createElement("tr");
        if (isWinner) tr.classList.add("winner");
        
        // Add staggered animation delay
        tr.style.animationDelay = `${index * 0.1}s`;

        tr.innerHTML = `
          <td>
            <div style="font-weight: 700; color: #1e3a8a;">${meta.name} ${isWinner ? '<span class="winner-badge">🏆 Winner</span>' : ''}</div>
          </td>
     <td style="font-size:14px;">
  <span style="color:#334155; font-weight:600;">
    ${meta.party}
  </span>
  <span style="color:#94a3b8;">
    (${row.symbol})
  </span>
</td>



          <td style="font-size: 18px;">${row.total_votes}</td>
        `;
        tbody.appendChild(tr);
        labels.push(meta.name);
        votes.push(row.total_votes);
        colors.push(isWinner ? "#1E3A8A" : "#60a5fa");
      });
      updateChart(labels, votes, colors);
    }

    function updateChart(labels, votes, colors) {
      const ctx = document.getElementById("resultChart").getContext("2d");
      if (chartInstance) chartInstance.destroy();
      chartInstance = new Chart(ctx, {
        type: "bar",
        data: {
          labels,
          datasets: [{
            data: votes,
            backgroundColor: colors,
            borderRadius: 8,
            borderSkipped: false,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { 
            legend: { display: false },
            tooltip: {
                backgroundColor: '#1e293b',
                padding: 12,
                cornerRadius: 10,
                titleFont: { size: 14, weight: 'bold' }
            }
          },
          scales: { 
            y: { 
                beginAtZero: true,
                grid: { display: false },
                ticks: { color: '#94a3b8' }
            },
            x: {
                grid: { display: false },
                ticks: { color: '#64748b', font: { size: 11 } }
            }
          }
        }
      });
    }
    
    // Auto refresh logic
    setInterval(loadResults, 5000); // Increased to 5s for smoother UX
    loadResults();
  </script>
</body>
</html>
