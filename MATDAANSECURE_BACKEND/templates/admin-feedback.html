<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Feedback Panel - MATDAANSECURE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    
    body {
      background: #ffffff; /* Solid white background */
      color: #111827;
      padding: 20px;
      padding-top: 100px;
      overflow-x: hidden;
    }

    /* ===== ASHOKA CHAKRA BACKGROUND ===== */
    .chakra-bg {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      opacity: 0.05;
      z-index: -1;
      animation: spin 40s linear infinite;
      pointer-events: none;
    }

    @keyframes spin { 
      from { transform: translate(-50%, -50%) rotate(0deg); } 
      to { transform: translate(-50%, -50%) rotate(360deg); } 
    }

    h1 {
      color: #1E3A8A;
      text-align: center;
      margin-bottom: 30px;
    }

    /* ===== APP HEADER ===== */
    .app-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 64px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      z-index: 3000;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-left img { width: 38px; height: 38px; }
    .header-left span { font-size: 22px; font-weight: 700; color: #1E3A8A; }
    .header-right button {
      background: #1E3A8A;
      color: #ffffff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .header-right button:hover { background: #2563EB; }

    /* Tabs */
    .tabs {
      display: flex;
      justify-content: center;
      margin-bottom: 25px;
      gap: 15px;
    }
    .tab {
      background: #E5E7EB;
      color: #1E3A8A;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s ease;
      position: relative;
    }
    .tab.active { background: #1E3A8A; color: white; }
    .tab:hover { background: #2563EB; color: white; }
    .tab .badge {
      position: absolute;
      top: -8px;
      right: -10px;
      background: #dc2626;
      color: white;
      font-size: 11px;
      border-radius: 50%;
      padding: 2px 7px;
      border: 2px solid white;
    }

    /* Feedback Cards (Glassmorphism) */
    #feedback-container {
      max-width: 750px;
      margin: 0 auto;
    }
    .feedback-card {
      background: rgba(255, 255, 255, 0.8); /* Semi-transparent */
      backdrop-filter: blur(10px); /* Blur effect */
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.07);
      margin-bottom: 20px;
      transition: transform 0.2s ease;
    }
    .feedback-card:hover { transform: translateY(-3px); }
    .feedback-card h3 { color: #1E3A8A; margin-bottom: 12px; border-bottom: 1px solid #e5e7eb; padding-bottom: 8px; }
    .feedback-card p { margin: 6px 0; line-height: 1.5; }

    /* Status Colors */
    .status-text.PENDING { color: #ca8a04; font-weight: 600; }
    .status-text.APPROVED { color: #16a34a; font-weight: 700; }
    .status-text.REJECTED { color: #dc2626; font-weight: 700; }

    .actions { margin-top: 15px; display: flex; gap: 10px; }
    .btn-approve { background: #16a34a; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .btn-reject { background: #dc2626; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .btn-approve:hover { background: #15803d; }
    .btn-reject:hover { background: #b91c1c; }

  </style>
</head>
<body>

<img src="https://upload.wikimedia.org/wikipedia/commons/1/17/Ashoka_Chakra.svg" alt="Ashoka Chakra" class="chakra-bg">

<div class="app-header">
  <div class="header-left">
    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="MATDAANSECURE">
    <span>MATDAANSECURE</span>
  </div>
  <div class="header-right">
    <button onclick="window.location.href='admin-dashboard'">← Back to Dashboard</button>
  </div>
</div>

<h1>Admin Feedback Panel</h1>

<div class="tabs">
  <div class="tab active" id="tab-complaint" onclick="switchTab('complaint')">
    Complaints <span class="badge" id="badge-complaint" style="display:none;">0</span>
  </div>
  <div class="tab" id="tab-correction" onclick="switchTab('correction')">
    Corrections <span class="badge" id="badge-correction" style="display:none;">0</span>
  </div>
  <div class="tab" id="tab-suggestion" onclick="switchTab('suggestion')">
    Suggestions <span class="badge" id="badge-suggestion" style="display:none;">0</span>
  </div>
</div>

<div id="feedback-container"></div>

<script>
let currentTab = "complaint";

function switchTab(tabName) {
  currentTab = tabName;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(`tab-${tabName}`).classList.add("active");
  loadFeedbacks();
}

function loadFeedbacks() {
  const container = document.getElementById("feedback-container");
  container.innerHTML = "<p style='text-align:center;'>Loading records...</p>";

  fetch("http://127.0.0.1:5001/admin/get_all_feedbacks")
    .then(res => res.json())
    .then(data => {
      container.innerHTML = "";
      let items = data[currentTab + "s"] || [];

      if (items.length === 0) {
        container.innerHTML = `<p style="text-align:center;color:#64748b;">No ${currentTab} records found.</p>`;
        updateBadges(data);
        return;
      }

      items.forEach(item => {
        const card = document.createElement("div");
        card.className = "feedback-card";

        let content = `<h3>${currentTab.toUpperCase()} REQUEST</h3>
                       <p><b>Reference ID:</b> ${item.reference_id}</p>
                       <p><b>Voter ID:</b> ${item.voter_id}</p>`;

     if (currentTab === "correction") {

  content += `<p><b>Field:</b> ${item.field_name}</p>
              <p><b>Old Value:</b> ${item.old_value}</p>
              <p><b>New Value:</b> ${item.new_value}</p>`;

  // 📄 Show uploaded document
  if (item.document) {
    content += `<p><b>Document:</b> 
                <a href="/view-document/${item.document}" target="_blank">View Document</a>`;
  }

} else {

  content += `<p><b>Type:</b> ${item.type}</p>
              <p><b>Message:</b> ${item.message}</p>`;

}

        content += `<p><b>Status:</b> <span class="status-text ${item.status}">${item.status}</span></p>`;

        if (item.status === "PENDING") {
          content += `<div class="actions">
                        <button class="btn-approve" onclick="handleAction('${currentTab}', 'approve', '${item.reference_id}', this)">Approve</button>
                        <button class="btn-reject" onclick="handleAction('${currentTab}', 'reject', '${item.reference_id}', this)">Reject</button>
                      </div>`;
        }
        card.innerHTML = content;
        container.appendChild(card);
      });
      updateBadges(data);
    })
    .catch(() => container.innerHTML = "Error connecting to server.");
}

function updateBadges(data) {
  ["complaint", "correction", "suggestion"].forEach(type => {
    const pendingCount = (data[type + "s"] || []).filter(x => x.status === "PENDING").length;
    const badge = document.getElementById(`badge-${type}`);
    badge.style.display = pendingCount > 0 ? "inline-block" : "none";
    badge.textContent = pendingCount;
  });
}

function handleAction(type, action, refId, btn) {
  const url = `http://127.0.0.1:5001/admin/${action}_${type}`;
  fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ reference_id: refId })
  }).then(() => {
    const card = btn.closest(".feedback-card");
    const statusText = action === 'approve' ? 'APPROVED' : 'REJECTED';
    const statusSpan = card.querySelector(".status-text");
    statusSpan.textContent = statusText;
    statusSpan.className = `status-text ${statusText}`;
    btn.parentElement.remove();
  });
}

window.onload = loadFeedbacks;
</script>
</body>
</html>
