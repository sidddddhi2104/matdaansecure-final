<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Analytics | MatdaanSecure</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --primary: #1E3A8A;
  --accent: #0EA5E9;
  --hover: #2563EB;
  --bg-light: #f9fafb;
  --text: #111827;
  --card-bg: rgba(255,255,255,0.6);
}

* {
  margin: 0; padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, sans-serif;
}

body {
  background: linear-gradient(to bottom right, #ffffff, var(--bg-light));
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  color: var(--text);
  position: relative;
  overflow-x: hidden;
}
/* ===== COMMON APP BAR ===== */
  .app-header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 64px;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;   /* ⬅ reduce from 24px */
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  z-index: 3000;
  box-sizing: border-box; /* ⬅ VERY IMPORTANT */
}


    .header-left{
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-left img{
      width: 38px;
      height: 38px;
    }

    .header-left span{
      font-size: 22px;
      font-weight: 700;
      color: #1E3A8A;
    }

    .header-right button{
      background: #1E3A8A;
      color: #ffffff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    .header-right button:hover{
      background: #2563EB;
    }

/* Chakra */
.chakra-bg {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 15cm; height: 15cm;
  opacity: 0.04;
  animation: spin 30s linear infinite;
  pointer-events: none;
  z-index: 0;
}
@keyframes spin {
  0% { transform: translate(-50%,-50%) rotate(0deg); }
  100% { transform: translate(-50%,-50%) rotate(360deg); }
}
/* Title */
h1 {
  color: var(--primary);
  margin-top: 80px;
  font-size: 2.2rem;
  letter-spacing: 0.5px;
  position: relative;
  z-index: 10;
}
h1::after {
  content: "";
  display: block;
  width: 100px;
  height: 4px;
  background: var(--accent);
  margin: 10px auto 0;
  border-radius: 4px;
}

/* Analytics Container */
.analytics-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 30px auto;
  width: 85%;
  z-index: 10;
}

/* Tabs */
.tab-buttons {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}
.tab-buttons button {
  background: white;
  color: var(--primary);
  border: 2px solid var(--accent);
  padding: 8px 18px;
  border-radius: 25px;
  cursor: pointer;
  transition: 0.3s;
  font-weight: 600;
}
.tab-buttons button.active,
.tab-buttons button:hover {
  background: var(--accent);
  color: white;
}

/* Card */
.analytics-card {
  background: var(--card-bg);
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.06);
  width: 90%;
  max-width: 950px;
  backdrop-filter: blur(6px);
  transition: transform 0.3s ease;
}
.analytics-card:hover {
  transform: scale(1.02);
}
canvas {
  width: 100%;
  height: 400px;
}

/* Fade animation */
.fade-in {
  animation: fadeIn 0.6s ease forwards;
}
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>
<body>
<!-- APP HEADER -->
<div class="app-header">
  <div class="header-left">
    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="MATDAANSECURE">
<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <span>MATDAANSECURE</span>
  </div>
  <div class="header-right">
    <button onclick="window.location.href='admin-dashboard'">← Back to Home</button>
  </div>
</div>

<!-- Chakra Background -->
<div class="chakra-bg">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/17/Ashoka_Chakra.svg/2048px-Ashoka_Chakra.svg.png" width="100%" height="100%">
</div>

<!-- Title -->
<h1>Admin Analytics</h1>

<div class="analytics-container fade-in">

  <!-- Tabs -->
  <div class="tab-buttons">
    <button class="active" onclick="showChart('activity')">📊 System Activity</button>
    <button onclick="showChart('performance')">⚙️ Performance</button>
    <button onclick="showChart('feedback')">💬 Feedback</button>
  </div>

  <!-- Chart Card -->
  <div class="analytics-card">
    <canvas id="analyticsChart"></canvas>
  </div>

</div>
<script>
let chart;
let analyticsData = null;

async function loadAnalytics() {
  const res = await fetch("/admin/analytics");
  analyticsData = await res.json();
  showChart('activity');
}

function showChart(type) {
  const ctx = document.getElementById('analyticsChart').getContext('2d');
  if (chart) chart.destroy();

  let data;

  if (type === 'activity') {
    data = {
      labels: ['Voters Registered', 'Votes Cast', 'Did Not Vote'],
      datasets: [{
        data: [
          analyticsData.activity.voters_registered,
          analyticsData.activity.votes_cast,
          analyticsData.activity.did_not_vote
        ],
        backgroundColor: ['#0EA5E9', '#2563EB', '#FACC15'],
        borderRadius: 10
      }]
    };
  }

  if (type === 'feedback') {
    data = {
      labels: ['Suggestions', 'Complaints', 'Corrections'],
      datasets: [{
        data: [
          analyticsData.feedback.suggestions,
          analyticsData.feedback.complaints,
          analyticsData.feedback.corrections
        ],
        backgroundColor: ['#22C55E', '#EF4444', '#FACC15'],
        borderRadius: 10
      }]
    };
  }

  if (type === 'performance') {
    data = {
      labels: ['System Stability', 'Data Integrity', 'Audit Score'],
      datasets: [{
        data: [92, 96, 90],
        backgroundColor: ['#60A5FA', '#2563EB', '#93C5FD'],
        borderRadius: 10
      }]
    };
  }

  chart = new Chart(ctx, {
    type: 'bar',
    data,
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true } }
    }
  });

  document.querySelectorAll('.tab-buttons button')
    .forEach(btn => btn.classList.remove('active'));
  document
    .querySelector(`.tab-buttons button[onclick="showChart('${type}')"]`)
    .classList.add('active');
}

loadAnalytics();
</script>
</body>
</html>
